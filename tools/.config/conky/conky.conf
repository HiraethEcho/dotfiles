-- Configuration settings: https://conky.cc/config_settings
conky.config = {
	alignment = "top_right",
	background = false,
	cpu_avg_samples = 2,
	default_color = "green",
	draw_outline = false,
	default_outline_color = "white",
	draw_shades = false,
	default_shade_color = "blue",
	double_buffer = true,
	draw_borders = true,
	draw_graph_borders = true,
	extra_newline = false,
	font = "CodeNewRoman Nerd Font Mono:size=12",
	gap_x = 10,
	gap_y = 10,
	minimum_height = 5,
	minimum_width = 150,
	-- maximum_width = 230,
	net_avg_samples = 2,
	no_buffers = true,
	out_to_console = false,
	out_to_ncurses = false,
	out_to_stderr = false,
	out_to_wayland = true,
	out_to_x = false,
	own_window = false,
	own_window_class = "Conky",
	-- own_window_type = "normal",
	own_window_type = "dock",
	own_window_transparent = true,
	own_window_hints = "undecorated,sticky,below,skip_taskbar,skip_pager",
	show_graph_range = true,
	show_graph_scale = true,
	stippled_borders = 0,
	update_interval = 1.0,
	uppercase = true,
	use_spacer = "none",
	use_xft = true,
}

-- Variables: https://conky.cc/variables
-- ${image ~/Pictures/wallpapers/arch.png -p 0,44}\
-- ${font Noto Sans:bold:size=8}${alignc}${desktop_name} ${desktop}/$desktop_number
conky.text = [[
${font CodeNewRoman Nerd Font Mono:bold:size=12}${color yellow}Info \
${font IBM Plex Mono:bold:size=12}${color yellow}Info \
${font DaddyTimeMono Nerd Font:bold:size=12}${color yellow}Info \
${font Maple Nerd Font:italic:size=12}${color yellow}Info ${hr 2}${font CodeNewRoman Nerd Font Mono:size=9}
${distribution} - ${user_names} - ${fs_type /} 
storage ${fs_used /}/${fs_size /} - ${fs_used_perc /}% ${fs_bar /home/hiraeth}
${font Monaco Nerd Font Mono:bold:size=12}${color blue}bluetooth ${hr 2}${font CodeNewRoman Nerd Font Mono:size=9}
${exec bluetoothctl devices Connected | grep Device | cut -d ' ' -f 3- 2>/dev/null}
${exec pamixer --get-volume-human} ${execbar pamixer --get-volume}
${font Entopia:bold:size=12}${color white}caldenar ${hr 2}${font CodeNewRoman Nerd Font Mono:size=9} ${exec cal -w -m}
${time %Y/%m/%d - %H:%M:%S- %V }
${font CodeNewRoman Nerd Font Mono:bold:size=12}${color 33E9FF}PERFORMANCE ${hr 2}${font}
${offset 15}${color FFFDE2}System Uptime ${alignr}$color $uptime
${offset 15}${color FFFDE2}RAM :$color $mem $memperc% ${color yellow}${membar 4}
${offset 15}${color FFFDE2}Swap:$color $swap/$swapmax $swapperc% ${color yellow}${swapbar 4}
${offset 15}${color FFFDE2}Battery: ${battery_percent BAT1}% ${color yellow}${alignr}${battery_bar 4, 130 BAT1}
${offset 15}${font}${color FFFDE2}Procs:$color $processes  ${color FFFDE2}Run:$color $running_processes Temp: ${acpitemp}°C
${offset 25}${font DejaVu Sans Mono:size=8}${battery_time BAT1}${font DejaVu Sans Mono:size=8}${color FFFDE2}
${offset 15}Core 1   ${color ff8300}${cpubar cpu1 6}${color FFFDE2}
${offset 15}Core 2   ${color ff8300}${cpubar cpu2 6}${color FFFDE2}
${offset 15}Core 3   ${color ff8300}${cpubar cpu3 6}${color FFFDE2}
${offset 15}Core 4   ${color ff8300}${cpubar cpu4 6}${color FFFDE2}
${font Entopia:bold:size=12}${color orange}NETWORK ${hr 2}${font CodeNewRoman Nerd Font Mono:size=9}
${offset 15}${wireless_essid wlan0}  ${alignr}${wireless_link_qual_perc wlan0}%(${wireless_link_qual wlan0}/${wireless_link_qual_max wlan0}) ${addr wlan0}
${color green}${offset 15}total ▼ ${totaldown wlan0} ${alignr}▲ ${totalup wlan0}
${offset 15}speed ▼ ${downspeed wlan0} ${alignr}▲ ${upspeed wlan0}
${font Entopia:bold:size=12}${color red}PROCESSES ${hr 2}
${offset 15}${font Noto sans:size=8}${color EDE0FF}Name               ${alignr}PID   CPU%   MEM%
${offset 15}${color FF7878}${top name 1} ${alignr}${top pid 1} ${top cpu 1} ${top mem 1}
${offset 15}${color FF7878}${top name 2} ${alignr}${top pid 2} ${top cpu 2} ${top mem 2}
${offset 15}${color FF7878}${top name 3} ${alignr}${top pid 3} ${top cpu 3} ${top mem 3}
${offset 15}${color FF7878}${top name 4} ${alignr}${top pid 4} ${top cpu 4} ${top mem 4}
]]
